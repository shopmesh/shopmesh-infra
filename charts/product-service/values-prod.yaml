# values-prod.yaml — product-service (PROD)
# CI updates image.tag on every main branch push.

global:
  namespace: prod
  imagePullPolicy: Always
  partOf: shopmesh
  gateway:
    enabled: true
  ingress:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"

image:
  repository: priyatham753/product-service
  tag: "v1.0.0"                  # <-- CI updates this (semantic version)

replicaCount: 2
port: 3002

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

env:
  PORT: "3002"
  NODE_ENV: "production"
  AUTH_SERVICE_URL: "http://auth-service.prod.svc.cluster.local:3001"
  MONGO_HOST: "mongodb-0.mongodb-headless.prod.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DB: "productdb"

secrets:
  MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3MucHJvZC5zdmMuY2x1c3Rlci5sb2NhbDoyNzAxNy9wcm9kdWN0ZGI/YXV0aFNvdXJjZT1hZG1pbg==

probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
