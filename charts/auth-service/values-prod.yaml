# values-prod.yaml — auth-service (PROD)
# CI updates image.tag on every main branch push.

global:
  namespace: prod
  imagePullPolicy: Always
  partOf: shopmesh
  gateway:
    enabled: true
  ingress:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
image:
  repository: priyatham753/auth-service
  tag: "v0.1.0" # <-- CI updates this (semantic version)
replicaCount: 2
port: 3001
resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
env:
  PORT: "3001"
  NODE_ENV: "production"
  JWT_EXPIRES_IN: "24h"
  MONGO_HOST: "mongodb-0.mongodb-headless.prod.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DB: "authdb"
secrets:
  JWT_SECRET: c2hvcG1lc2hfand0X3NlY3JldF9jaGFuZ2VfaW5fcHJvZHVjdGlvbl8yMDI0
  MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3MucHJvZC5zdmMuY2x1c3Rlci5sb2NhbDoyNzAxNy9hdXRoZGI/YXV0aFNvdXJjZT1hZG1pbg==
probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
