# values-dev.yaml — mongodb (DEV)
# Not updated by CI — infrastructure config only.

global:
  namespace: dev
  imagePullPolicy: IfNotPresent
  partOf: shopmesh
  gateway:
    enabled: false
  ingress:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"

image:
  repository: mongo
  tag: "7.0"

replicaCount: 1
port: 27017

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

storage:
  storageClassName: nfs-storage
  size: 5Gi
  accessMode: ReadWriteMany

nfs:
  server: "172.31.24.10"           # <-- Replace with your NFS server IP
  path: "/exports/mongodb"

secrets:
  MONGO_ROOT_USERNAME: YWRtaW4=
  MONGO_ROOT_PASSWORD: ZGV2LXBhc3N3b3Jk
  AUTH_MONGO_URI: bW9uZ29kYjovL2FkbWluOmRldi1wYXNzd29yZEBtb25nb2RiLTAubW9uZ29kYi1oZWFkbGVzcy5kZXYuc3ZjLmNsdXN0ZXIubG9jYWw6MjcwMTcvYXV0aGRiP2F1dGhTb3VyY2U9YWRtaW4=
  PRODUCT_MONGO_URI: bW9uZ29kYjovL2FkbWluOmRldi1wYXNzd29yZEBtb25nb2RiLTAubW9uZ29kYi1oZWFkbGVzcy5kZXYuc3ZjLmNsdXN0ZXIubG9jYWw6MjcwMTcvcHJvZHVjdGRiP2F1dGhTb3VyY2U9YWRtaW4=
  ORDER_MONGO_URI: bW9uZ29kYjovL2FkbWluOmRldi1wYXNzd29yZEBtb25nb2RiLTAubW9uZ29kYi1oZWFkbGVzcy5kZXYuc3ZjLmNsdXN0ZXIubG9jYWw6MjcwMTc=

probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
