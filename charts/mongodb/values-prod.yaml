# values-prod.yaml — mongodb (PROD)
# Not updated by CI — infrastructure config only.

global:
  namespace: prod
  imagePullPolicy: IfNotPresent
  partOf: shopmesh
  gateway:
    enabled: false
  ingress:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"

image:
  repository: mongo
  tag: "7.0"

replicaCount: 1
port: 27017

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

storage:
  storageClassName: nfs-client
  size: 50Gi
  accessMode: ReadWriteMany


