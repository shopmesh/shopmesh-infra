# ──────────────────────────────────────────────────────────────────────────────
# charts/frontend/templates/configmap.yaml
# Non-sensitive env vars for the React / Nginx container
# ──────────────────────────────────────────────────────────────────────────────
{{- $vals := .Values }}
{{- $global := .Values.global }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: frontend
data:
  {{- range $key, $value := $vals.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
