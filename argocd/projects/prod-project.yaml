# =============================================================================
# ArgoCD AppProject — PROD
#
# Scopes the prod Application strictly to:
#   • Source: shopmesh-infra repo only (single-repo GitOps)
#   • Destination: prod namespace only
#   • Manual sync only — no automation
#
# All Kubernetes resource types used by the umbrella chart are whitelisted.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopmesh-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "ShopMesh — Production environment"

  # Single repo — everything lives in shopmesh-infra
  sourceRepos:
    - https://github.com/shopmesh/shopmesh-infra.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod
    - server: https://kubernetes.default.svc
      namespace: argocd

  # ── Cluster-scoped resources created by the chart ───────────────────────────
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "storage.k8s.io"
      kind: StorageClass
    - group: ""
      kind: PersistentVolume
    - group: "gateway.networking.k8s.io"
      kind: GatewayClass
    - group: "argoproj.io"
      kind: Application

  # ── Namespace-scoped resources created by the chart ─────────────────────────
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: "networking.k8s.io"
      kind: NetworkPolicy
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "gateway.networking.k8s.io"
      kind: Gateway
    - group: "gateway.networking.k8s.io"
      kind: HTTPRoute

  orphanedResources:
    warn: true
