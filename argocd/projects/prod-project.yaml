# =============================================================================
# ArgoCD AppProject — PROD
#
# Scopes all prod child Applications to:
#   • Source: shopmesh-infra (values) + helm-charts (charts) repos
#   • Destination: prod namespace only
#   • Auto-sync ON with selfHeal and prune
#
# All Kubernetes resource types used by the per-service charts are whitelisted.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopmesh-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "ShopMesh — Production environment"

  # Two repos: infra for values, helm-charts for chart templates
  sourceRepos:
    - https://github.com/shopmesh/shopmesh-infra.git
    - https://github.com/shopmesh/helm-charts.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod
    - server: https://kubernetes.default.svc
      namespace: argocd

  # ── Cluster-scoped resources created by the chart ───────────────────────────
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "storage.k8s.io"
      kind: StorageClass
    - group: ""
      kind: PersistentVolume
    - group: "gateway.networking.k8s.io"
      kind: GatewayClass

  # ── Namespace-scoped resources created by the chart ─────────────────────────
  namespaceResourceWhitelist:
    - group: "argoproj.io"
      kind: Application
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: "networking.k8s.io"
      kind: NetworkPolicy
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "gateway.networking.k8s.io"
      kind: Gateway
    - group: "gateway.networking.k8s.io"
      kind: HTTPRoute

  orphanedResources:
    warn: false
