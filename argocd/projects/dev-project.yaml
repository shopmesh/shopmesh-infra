# =============================================================================
# ArgoCD AppProject — DEV
#
# Scopes all dev child Applications to:
#   • Source: shopmesh-infra (values) + helm-charts (charts) repos
#   • Destination: dev namespace only
#
# All Kubernetes resource types used by the per-service charts are whitelisted.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: shopmesh-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "ShopMesh — Development environment"

  # Two repos: infra for values, helm-charts for chart templates
  sourceRepos:
    - https://github.com/shopmesh/shopmesh-infra.git
    - https://github.com/shopmesh/helm-charts.git

  destinations:
    - server: https://kubernetes.default.svc
      namespace: dev
    # argocd namespace is needed so the App of Apps can manage child Applications
    - server: https://kubernetes.default.svc
      namespace: argocd

  # ── Cluster-scoped resources created by the chart ───────────────────────────
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "storage.k8s.io"
      kind: StorageClass
    - group: ""
      kind: PersistentVolume
    - group: "gateway.networking.k8s.io"
      kind: GatewayClass
    - group: "argoproj.io"
      kind: Application

  # ── Namespace-scoped resources created by the chart ─────────────────────────
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: "networking.k8s.io"
      kind: NetworkPolicy
    - group: "networking.k8s.io"
      kind: Ingress
    - group: "gateway.networking.k8s.io"
      kind: Gateway
    - group: "gateway.networking.k8s.io"
      kind: HTTPRoute

  orphanedResources:
    warn: true
