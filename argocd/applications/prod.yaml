# =============================================================================
# ArgoCD Application — PROD
#
# • Tracks the `main` branch of shopmesh-infra (single repo)
# • Helm chart lives at helm/ inside the same repo
# • Auto-sync DISABLED — manual sync required (production gate)
# • Namespace `prod` is auto-created by ArgoCD
# • Values merged: helm/values.yaml  +  helm/environments/prod/values.yaml
#
# CI workflow on the main branch:
#   1. Build Docker image → push to registry
#   2. Update image tag in helm/environments/prod/values.yaml
#   3. git commit + push → ArgoCD detects change, waits for manual approval
#   4. Operator clicks SYNC in ArgoCD UI (or runs: argocd app sync shopmesh-prod)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopmesh-prod
  namespace: argocd
  labels:
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopmesh-prod

  source:
    repoURL: https://github.com/shopmesh/shopmesh-infra.git
    targetRevision: main             # prod image tags live on this branch
    path: helm                       # umbrella chart root inside the repo

    helm:
      releaseName: shopmesh
      valueFiles:
        - values.yaml                      # base defaults (shared)
        - environments/prod/values.yaml    # prod overrides — CI updates image tags here

  destination:
    server: https://kubernetes.default.svc
    namespace: prod                        # matches global.namespace set in prod values

  # NO automated block → manual sync only (production safety gate)
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
