# =============================================================================
# ArgoCD Application — DEV
#
# • Tracks the `develop` branch of shopmesh-infra (single repo)
# • Helm chart lives at helm/ inside the same repo
# • Auto-sync ENABLED (prune + selfHeal)
# • Namespace `dev` is auto-created by ArgoCD
# • Values merged: helm/values.yaml  +  helm/environments/dev/values.yaml
#
# CI workflow on the develop branch:
#   1. Build Docker image → push to registry
#   2. Update image tag in helm/environments/dev/values.yaml
#   3. git commit + push → ArgoCD detects change and auto-syncs
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shopmesh-dev
  namespace: argocd
  labels:
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: shopmesh-dev

  source:
    repoURL: https://github.com/shopmesh/shopmesh-infra.git
    targetRevision: develop          # dev image tags live on this branch
    path: helm                       # umbrella chart root inside the repo

    helm:
      releaseName: shopmesh
      valueFiles:
        - values.yaml                      # base defaults (shared)
        - environments/dev/values.yaml     # dev overrides — CI updates image tags here

  destination:
    server: https://kubernetes.default.svc
    namespace: dev                         # matches global.namespace set in dev values

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
