# ── Global ───────────────────────────────────────────────────────────────────
global:
  namespace: prod                  # ← ArgoCD deploys to this namespace
  imagePullPolicy: Always
  partOf: shopmesh
  gateway:
    enabled: true
  ingress:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"

# ── auth-service ─────────────────────────────────────────────────────────────
auth-service:
  image:
    repository: priyatham753/auth-service
    tag: "v1.0.0"                  # <-- CI updates this field

  replicaCount: 2

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  env:
    PORT: "3001"
    NODE_ENV: "production"
    JWT_EXPIRES_IN: "24h"
    MONGO_HOST: "mongodb-0.mongodb-headless.prod.svc.cluster.local"
    MONGO_PORT: "27017"
    MONGO_DB: "authdb"

  secrets:
    # echo -n 'shopmesh_jwt_secret_change_in_production_2024' | base64
    JWT_SECRET: c2hvcG1lc2hfand0X3NlY3JldF9jaGFuZ2VfaW5fcHJvZHVjdGlvbl8yMDI0
    # mongodb://admin:shopmesh-db-password-2024@mongodb-0.mongodb-headless.prod.svc.cluster.local:27017/authdb?authSource=admin
    MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3MucHJvZC5zdmMuY2x1c3Rlci5sb2NhbDoyNzAxNy9hdXRoZGI/YXV0aFNvdXJjZT1hZG1pbg==

