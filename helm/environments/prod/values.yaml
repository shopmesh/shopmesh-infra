    MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3MucHJvZC5zdmMuY2x1c3Rlci5sb2NhbDoyNzAxNw==

# ── frontend ─────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: priyatham753/frontend
    tag: "v1.0.0"                  # <-- CI updates this field

  replicaCount: 2

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

  env:
    REACT_APP_AUTH_SERVICE_URL: "/api/auth"
    REACT_APP_PRODUCT_SERVICE_URL: "/api/products"
    REACT_APP_ORDER_SERVICE_URL: "/api/orders"
    NGINX_PORT: "80"

# ── mongodb ──────────────────────────────────────────────────────────────────
mongodb:
  image:
    repository: mongo
    tag: "7.0"

  replicaCount: 1
  port: 27017

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

  storage:
    storageClassName: nfs-storage
    size: 50Gi
    accessMode: ReadWriteMany

  nfs:
    server: "172.31.24.10"         # ← Replace with your NFS server IP
    path: "/exports/mongodb"       # prod NFS export path

  secrets:
    # echo -n 'admin' | base64
    MONGO_ROOT_USERNAME: YWRtaW4=
    # echo -n 'shopmesh-db-password-2024' | base64
    MONGO_ROOT_PASSWORD: c2hvcG1lc2gtZGItcGFzc3dvcmQtMjAyNA==
    AUTH_MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3MucHJvZC5zdmMuY2x1c3Rlci5sb2NhbDoyNzAxNy9hdXRoZGI/YXV0aFNvdXJjZT1hZG1pbg==
    PRODUCT_MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3MucHJvZC5zdmMuY2x1c3Rlci5sb2NhbDoyNzAxNy9wcm9kdWN0ZGI/YXV0aFNvdXJjZT1hZG1pbg==
    ORDER_MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3MucHJvZC5zdmMuY2x1c3Rlci5sb2NhbDoyNzAxNw==

# ── gateway ──────────────────────────────────────────────────────────────────
gateway:
  gatewayClassName: envoy-gateway-class
  listener:
    name: http
    port: 80
    protocol: HTTP
  routes:
    - path: /api/auth
      serviceName: auth-service
      servicePort: 3001
    - path: /api/products
      serviceName: product-service
      servicePort: 3002
    - path: /api/orders
      serviceName: order-service
      servicePort: 3003
    - path: /
      serviceName: frontend
      servicePort: 80
