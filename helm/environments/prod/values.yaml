# ── order-service ────────────────────────────────────────────────────────────
order-service:
  image:
    repository: priyatham753/order-service
    tag: "v1.0.0"                  # <-- CI updates this field

  replicaCount: 2

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  env:
    PORT: "3003"
    NODE_ENV: "production"
    DB_NAME: "orderdb"
    AUTH_SERVICE_URL: "http://auth-service.prod.svc.cluster.local:3001"
    PRODUCT_SERVICE_URL: "http://product-service.prod.svc.cluster.local:3002"
