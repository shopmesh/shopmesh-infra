# ══════════════════════════════════════════════════════════════════════════════
# helm-charts/values.yaml
#
# GLOBAL values file — the ONLY values.yaml in the entire chart hierarchy.
# Sub-charts reference these values via the parent scope:
#   .Values.<chart-name>.*  within the umbrella context
#   .Values.*               within each sub-chart template
#
# Deploy:  helm install shopmesh ./helm-charts -n shopmesh --create-namespace
# Upgrade: helm upgrade  shopmesh ./helm-charts -n shopmesh
# ══════════════════════════════════════════════════════════════════════════════

# ── Global settings shared by every chart ─────────────────────────────────────
global:
  # Kubernetes namespace for all resources
  namespace: shopmesh

  # Image pull policy applied to every service
  imagePullPolicy: Always

  # Project-wide label applied to every resource
  partOf: shopmesh

  # ── Gateway toggle ──────────────────────────────────────────────────────────
  # true  → deploy Envoy Gateway API (GatewayClass / Gateway / HTTPRoute)
  # false → deploy the legacy Nginx Ingress instead
  gateway:
    enabled: true

  # ── Legacy Ingress (only used when global.gateway.enabled = false) ──────────
  ingress:
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"

# ══════════════════════════════════════════════════════════════════════════════
# auth-service
# ══════════════════════════════════════════════════════════════════════════════
