    JWT_SECRET: c2hvcG1lc2hfand0X3NlY3JldF9jaGFuZ2VfaW5fcHJvZHVjdGlvbl8yMDI0
    # echo -n 'mongodb://admin:shopmesh-db-password-2024@mongodb-0...' | base64
    MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3Muc2hvcG1lc2guc3ZjLmNsdXN0ZXIubG9jYWw6MjcwMTcvYXV0aGRiP2F1dGhTb3VyY2U9YWRtaW4=

  probes:
    liveness:
      path: /health
      initialDelaySeconds: 30
