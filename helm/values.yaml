      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3

# ══════════════════════════════════════════════════════════════════════════════
# mongodb
# ══════════════════════════════════════════════════════════════════════════════
mongodb:
  image:
    repository: mongo
    tag: "7.0"

  # StatefulSet — single primary node
  replicaCount: 1

  port: 27017

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  # Persistent storage
  storage:
    storageClassName: nfs-storage
    size: 10Gi
    accessMode: ReadWriteMany

  # NFS PersistentVolume settings (used in pvc.yaml StorageClass)
  nfs:
    server: "172.31.24.10"       # ← Replace with your NFS server IP
    path: "/exports/mongodb"     # ← Replace with your NFS export path

  # Root credentials — base64-encoded
  secrets:
    # echo -n 'admin' | base64
    MONGO_ROOT_USERNAME: YWRtaW4=
    # echo -n 'shopmesh-db-password-2024' | base64
    MONGO_ROOT_PASSWORD: c2hvcG1lc2gtZGItcGFzc3dvcmQtMjAyNA==
    AUTH_MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3Muc2hvcG1lc2guc3ZjLmNsdXN0ZXIubG9jYWw6MjcwMTcvYXV0aGRiP2F1dGhTb3VyY2U9YWRtaW4=
    PRODUCT_MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3Muc2hvcG1lc2guc3ZjLmNsdXN0ZXIubG9jYWw6MjcwMTcvcHJvZHVjdGRiP2F1dGhTb3VyY2U9YWRtaW4=
    ORDER_MONGO_URI: bW9uZ29kYjovL2FkbWluOnNob3BtZXNoLWRiLXBhc3N3b3JkLTIwMjRAbW9uZ29kYi0wLm1vbmdvZGItaGVhZGxlc3Muc2hvcG1lc2guc3ZjLmNsdXN0ZXIubG9jYWw6MjcwMTc=

