# ══════════════════════════════════════════════════════════════════════════════
# gateway
# ══════════════════════════════════════════════════════════════════════════════
gateway:
  # GatewayClass name — must match the Envoy Gateway controller name
  gatewayClassName: envoy-gateway-class

  # Listener configuration
  listener:
    name: http
    port: 80
    protocol: HTTP

  # HTTPRoute path → backend mapping
  routes:
    - path: /auth
      serviceName: auth-service
      servicePort: 3001
    - path: /products
      serviceName: product-service
      servicePort: 3002
    - path: /orders
      serviceName: order-service
      servicePort: 3003
    - path: /
      serviceName: frontend
      servicePort: 80
