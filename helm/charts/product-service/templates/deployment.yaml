# ──────────────────────────────────────────────────────────────────────────────
# charts/product-service/templates/deployment.yaml
# Values consumed from root values.yaml → .Values["product-service"].*
# ──────────────────────────────────────────────────────────────────────────────
{{- $vals := .Values }}
{{- $global := .Values.global }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: product-service
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ $vals.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: product-service
        app.kubernetes.io/part-of: {{ $global.partOf }}
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      terminationGracePeriodSeconds: 30
      containers:
        - name: product-service
          image: "{{ $vals.image.repository }}:{{ $vals.image.tag }}"
          imagePullPolicy: {{ $global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $vals.port }}
              protocol: TCP

          envFrom:
            - configMapRef:
                name: product-service-config

          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: product-service-secret
                  key: MONGO_URI

          resources:
            requests:
              cpu: {{ $vals.resources.requests.cpu | quote }}
              memory: {{ $vals.resources.requests.memory | quote }}
            limits:
              cpu: {{ $vals.resources.limits.cpu | quote }}
              memory: {{ $vals.resources.limits.memory | quote }}

          livenessProbe:
            httpGet:
              path: {{ $vals.probes.liveness.path }}
              port: {{ $vals.port }}
            initialDelaySeconds: {{ $vals.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $vals.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ $vals.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ $vals.probes.liveness.failureThreshold }}

          readinessProbe:
            httpGet:
              path: {{ $vals.probes.readiness.path }}
              port: {{ $vals.port }}
            initialDelaySeconds: {{ $vals.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $vals.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ $vals.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ $vals.probes.readiness.failureThreshold }}
