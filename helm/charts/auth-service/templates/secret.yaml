# ──────────────────────────────────────────────────────────────────────────────
# charts/auth-service/templates/secret.yaml
# Sensitive credentials — base64-encoded values sourced from global values.yaml
#
# To regenerate:
#   echo -n 'your-jwt-secret' | base64
#   echo -n 'your-mongo-uri'  | base64
# ──────────────────────────────────────────────────────────────────────────────
{{- $vals := .Values }}
{{- $global := .Values.global }}
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: backend
type: Opaque
data:
  JWT_SECRET: {{ $vals.secrets.JWT_SECRET }}
  MONGO_URI: {{ $vals.secrets.MONGO_URI }}
