# ──────────────────────────────────────────────────────────────────────────────
# charts/mongodb/templates/pvc.yaml
#
# Defines the NFS StorageClass and PersistentVolume that back the StatefulSet's
# volumeClaimTemplate (mongodb-data-mongodb-0).
#
# Note: The PersistentVolumeClaim itself is auto-created by the StatefulSet
# volumeClaimTemplate. This file only provides the backing PV/StorageClass.
# ──────────────────────────────────────────────────────────────────────────────
#{{- $vals := .Values }}
{{- $vals := .Values }}
{{- $global := .Values.global }}

# ── StorageClass (static NFS — no dynamic provisioner required) ───────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ $vals.storage.storageClassName }}
  labels:
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
# ── PersistentVolume (NFS-backed) ─────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
  labels:
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: storage
    pv-name: mongodb-pv
spec:
  capacity:
    storage: {{ $vals.storage.size }}
  accessModes:
    - {{ $vals.storage.accessMode }}
  persistentVolumeReclaimPolicy: Retain
  storageClassName: {{ $vals.storage.storageClassName }}
  nfs:
    server: {{ $vals.nfs.server | quote }}
    path: {{ $vals.nfs.path | quote }}
  mountOptions:
    - hard
    - nfsvers=4.1
