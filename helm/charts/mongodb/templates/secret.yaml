# ──────────────────────────────────────────────────────────────────────────────
# charts/mongodb/templates/secret.yaml
# MongoDB root credentials and per-service connection strings (base64-encoded)
# ──────────────────────────────────────────────────────────────────────────────
{{- $vals := .Values }}
{{- $global := .Values.global }}
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: database
type: Opaque
data:
  MONGO_ROOT_USERNAME: {{ $vals.secrets.MONGO_ROOT_USERNAME }}
  MONGO_ROOT_PASSWORD: {{ $vals.secrets.MONGO_ROOT_PASSWORD }}
  AUTH_MONGO_URI: {{ $vals.secrets.AUTH_MONGO_URI }}
  PRODUCT_MONGO_URI: {{ $vals.secrets.PRODUCT_MONGO_URI }}
  ORDER_MONGO_URI: {{ $vals.secrets.ORDER_MONGO_URI }}
