# ──────────────────────────────────────────────────────────────────────────────
# charts/mongodb/templates/networkpolicy.yaml
#
# Zero-trust NetworkPolicy for the MongoDB StatefulSet pod.
#
# MongoDB is the most sensitive service in the cluster — it must be completely
# isolated from external traffic and from services that don't need it.
#
# INGRESS allowed:
#   • From auth-service    on port 27017 — stores user accounts
#   • From product-service on port 27017 — stores product catalogue
#   • From order-service   on port 27017 — stores orders
#   NO other ingress is permitted (especially NOT from frontend or gateway).
#
# EGRESS allowed:
#   • kube-dns / CoreDNS on TCP+UDP 53
#   • Nothing else — MongoDB does not need to call any other service.
#
# External access: EXPLICITLY BLOCKED (no namespaceSelector for external ns,
# no ipBlock rules, no LoadBalancer/NodePort — ClusterIP + headless only).
# ──────────────────────────────────────────────────────────────────────────────

{{- $global := .Values.global }}
{{- $vals   := .Values }}

# ── 1 of 2: Default-deny all ingress and egress for MongoDB pods ───────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-default-deny
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  # No ingress or egress rules = deny everything
  policyTypes:
    - Ingress
    - Egress

---
# ── 2 of 2: Explicit allow policy for MongoDB ─────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mongodb-allow
  namespace: {{ $global.namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/part-of: {{ $global.partOf }}
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mongodb
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # ── Allow from auth-service (stores user accounts) ────────────────────────
    # Both namespaceSelector and podSelector are combined with AND semantics
    # when placed inside the same `-from` list item (this is intentional).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $global.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: auth-service
      ports:
        - protocol: TCP
          port: {{ $vals.port }}   # 27017

    # ── Allow from product-service (stores product catalogue) ─────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $global.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: product-service
      ports:
        - protocol: TCP
          port: {{ $vals.port }}   # 27017

    # ── Allow from order-service (stores orders) ──────────────────────────────
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $global.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: order-service
      ports:
        - protocol: TCP
          port: {{ $vals.port }}   # 27017

  egress:
    # ── Allow DNS resolution ──────────────────────────────────────────────────
    # MongoDB itself resolves its own headless service DNS for replica-set
    # initialization (mongosh --eval and other maintenance commands).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
